};

  const getPhaseProgress = (phaseIdx) => {
    const p = phases[phaseIdx];
    let total = 0, done = 0;
    p.weeks.forEach((w, wi) => {
      w.daily.forEach((_, di) => {
        total++;
        if (checkedTasks[`${phaseIdx}-${wi}-${di}`]) done++;
      });
    });
    return total > 0 ? Math.round((done / total) * 100) : 0;
  };

  return (
    <div style={{
      fontFamily: "'Courier New', monospace",
      background: "#0a0a0f",
      minHeight: "100vh",
      color: "#e2e8f0",
    }}>
      {/* Header */}
      <div style={{
        background: "linear-gradient(135deg, #0a0a0f 0%, #0f172a 50%, #0a0a0f 100%)",
        borderBottom: "1px solid #1e293b",
        padding: "32px 24px 24px",
        textAlign: "center",
        position: "relative",
        overflow: "hidden",
      }}>
        <div style={{
          position: "absolute", top: 0, left: 0, right: 0, bottom: 0,
          backgroundImage: "radial-gradient(circle at 20% 50%, rgba(0,255,136,0.05) 0%, transparent 50%), radial-gradient(circle at 80% 50%, rgba(139,92,246,0.05) 0%, transparent 50%)",
        }} />
        <div style={{ fontSize: "11px", letterSpacing: "4px", color: "#64748b", marginBottom: "8px" }}>
          WARREN JOE ODERA · MSc INFORMATION SYSTEMS · USIU-AFRICA
        </div>
        <h1 style={{
          fontSize: "clamp(20px, 5vw, 40px)",
          fontWeight: "900",
          margin: "0 0 8px",
          letterSpacing: "-1px",
          background: "linear-gradient(90deg, #00ff88, #0ea5e9, #8b5cf6)",
          WebkitBackgroundClip: "text",
          WebkitTextFillColor: "transparent",
        }}>
          CLOUD / DEVOPS MASTERY ROADMAP
        </h1>
        <div style={{ fontSize: "13px", color: "#64748b", letterSpacing: "2px" }}>
          6–12 MONTHS · ZERO TO JUNIOR ENGINEER · TICK OFF TASKS AS YOU GO
        </div>
        <div style={{ display: "flex", gap: "12px", justifyContent: "center", marginTop: "20px", flexWrap: "wrap" }}>
          {certifications.map(cert => (
            <div key={cert.code} style={{
              border: `1px solid ${cert.color}40`,
              background: `${cert.color}10`,
              borderRadius: "4px",
              padding: "6px 14px",
              fontSize: "11px",
              letterSpacing: "1px",
              color: cert.color,
            }}>
              🏆 {cert.code} · {cert.month}
            </div>
          ))}
        </div>
      </div>

      {/* Phase selector */}
      <div style={{
        display: "flex",
        overflowX: "auto",
        padding: "16px",
        gap: "8px",
        borderBottom: "1px solid #1e293b",
        scrollbarWidth: "none",
      }}>
        {phases.map((p, i) => {
          const progress = getPhaseProgress(i);
          return (
            <button
              key={i}
              onClick={() => { setActivePhase(i); setExpandedWeek(null); }}
              style={{
                flex: "0 0 auto",
                background: activePhase === i ? `${p.color}20` : "transparent",
                border: `1px solid ${activePhase === i ? p.color : "#1e293b"}`,
                borderRadius: "4px",
                padding: "10px 14px",
                cursor: "pointer",
                color: activePhase === i ? p.color : "#64748b",
                fontSize: "10px",
                letterSpacing: "1px",
                fontFamily: "'Courier New', monospace",
                transition: "all 0.2s",
                whiteSpace: "nowrap",
                position: "relative",
              }}
            >
              <span style={{ marginRight: "5px" }}>{p.icon}</span>
              {p.title}
              {progress > 0 && (
                <span style={{
                  marginLeft: "6px",
                  background: p.color,
                  color: "#000",
                  borderRadius: "3px",
                  padding: "1px 5px",
                  fontSize: "9px",
                  fontWeight: "700",
                }}>{progress}%</span>
              )}
            </button>
          );
        })}
      </div>

      {/* Main content */}
      <div style={{ padding: "24px 16px", maxWidth: "900px", margin: "0 auto" }}>

        {/* Phase header */}
        <div style={{ borderLeft: `3px solid ${phase.color}`, paddingLeft: "20px", marginBottom: "24px" }}>
          <div style={{ fontSize: "11px", color: phase.color, letterSpacing: "2px", marginBottom: "4px" }}>
            PHASE {phase.id} · {phase.duration}
          </div>
          <h2 style={{ fontSize: "26px", fontWeight: "900", margin: "0 0 4px", color: "#f1f5f9" }}>
            {phase.icon} {phase.title}
          </h2>
          <div style={{ color: "#64748b", fontSize: "13px" }}>{phase.tagline}</div>
          <div style={{ marginTop: "10px", background: "#1e293b", borderRadius: "2px", height: "4px", overflow: "hidden" }}>
            <div style={{
              height: "100%",
              width: `${getPhaseProgress(activePhase)}%`,
              background: phase.color,
              transition: "width 0.4s ease",
              borderRadius: "2px",
            }} />
          </div>
          <div style={{ fontSize: "10px", color: "#475569", marginTop: "4px" }}>
            {getPhaseProgress(activePhase)}% complete — tick tasks below as you finish them
          </div>
        </div>

        {/* Weeks */}
        <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
          {phase.weeks.map((week, wi) => (
            <div key={wi} style={{
              border: `1px solid ${expandedWeek === wi ? phase.color + "60" : "#1e293b"}`,
              borderRadius: "6px",
              overflow: "hidden",
              transition: "border-color 0.2s",
            }}>
              <button
                onClick={() => setExpandedWeek(expandedWeek === wi ? null : wi)}
                style={{
                  width: "100%",
                  background: expandedWeek === wi ? `${phase.color}10` : "#0f172a",
                  border: "none",
                  padding: "14px 20px",
                  cursor: "pointer",
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                  fontFamily: "'Courier New', monospace",
                }}
              >
                <div style={{ textAlign: "left" }}>
                  <div style={{ fontSize: "10px", color: phase.color, letterSpacing: "2px", marginBottom: "2px" }}>
                    {week.week}
                  </div>
                  <div style={{ fontSize: "14px", fontWeight: "700", color: "#f1f5f9" }}>
                    {week.theme}
                  </div>
                </div>
                <div style={{
                  color: phase.color, fontSize: "18px",
                  transform: expandedWeek === wi ? "rotate(180deg)" : "rotate(0)",
                  transition: "transform 0.2s",
                }}>▾</div>
              </button>

              {expandedWeek === wi && (
                <div style={{ background: "#080c14", padding: "4px 0 8px" }}>
                  {week.daily.map((d, di) => {
                    const key = `${activePhase}-${wi}-${di}`;
                    const done = checkedTasks[key];
                    return (
                      <div
                        key={di}
                        onClick={() => toggleTask(wi, di)}
                        style={{
                          display: "flex",
                          gap: "12px",
                          padding: "10px 20px",
                          borderBottom: di < week.daily.length - 1 ? "1px solid #0f172a" : "none",
                          alignItems: "flex-start",
                          cursor: "pointer",
                          background: done ? `${phase.color}08` : "transparent",
                          transition: "background 0.2s",
                        }}
                      >
                        <div style={{
                          flex: "0 0 18px",
                          width: "18px",
                          height: "18px",
                          border: `1px solid ${done ? phase.color : "#334155"}`,
                          borderRadius: "3px",
                          background: done ? phase.color : "transparent",
                          display: "flex",
                          alignItems: "center",
                          justifyContent: "center",
                          fontSize: "11px",
                          color: "#000",
                          marginTop: "1px",
                          flexShrink: 0,
                          transition: "all 0.2s",
                        }}>
                          {done ? "✓" : ""}
                        </div>
                        <div style={{ flex: "0 0 64px", fontSize: "10px", letterSpacing: "1px", color: phase.color, paddingTop: "2px", fontWeight: "700" }}>
                          {d.day}
                        </div>
                        <div style={{ fontSize: "13px", color: done ? "#475569" : "#94a3b8", lineHeight: "1.5", textDecoration: done ? "line-through" : "none", transition: "all 0.2s" }}>
                          {d.task}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          ))}
        </div>

        {/* Resources */}
        <div style={{ marginTop: "20px", border: "1px solid #1e293b", borderRadius: "6px", padding: "18px", background: "#0f172a" }}>
          <div style={{ fontSize: "11px", letterSpacing: "2px", color: "#64748b", marginBottom: "10px" }}>📚 RESOURCES</div>
          {phase.resources.map((r, i) => (
            <div key={i} style={{ fontSize: "13px", color: "#94a3b8", marginBottom: "6px" }}>
              <span style={{ color: phase.color, marginRight: "8px" }}>→</span>{r}
            </div>
          ))}
        </div>

        {/* Milestone */}
        <div style={{ marginTop: "12px", border: `1px solid ${phase.color}40`, borderRadius: "6px", padding: "18px", background: `${phase.color}08` }}>
          <div style={{ fontSize: "11px", letterSpacing: "2px", color: phase.color, marginBottom: "8px" }}>🎯 PHASE MILESTONE</div>
          <div style={{ fontSize: "14px", color: "#e2e8f0", lineHeight: "1.6" }}>{phase.milestone}</div>
        </div>

        {/* Nav */}
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: "24px", gap: "12px" }}>
          {activePhase > 0 && (
            <button onClick={() => { setActivePhase(activePhase - 1); setExpandedWeek(null); window.scrollTo(0,0); }}
              style={{ background: "transparent", border: `1px solid ${phases[activePhase-1].color}60`, color: phases[activePhase-1].color, padding: "10px 20px", cursor: "pointer", borderRadius: "4px", fontFamily: "'Courier New', monospace", fontSize: "12px", letterSpacing: "1px" }}>
              ← {phases[activePhase - 1].title}
            </button>
          )}
          <div style={{ flex: 1 }} />
          {activePhase < phases.length - 1 && (
            <button onClick={() => { setActivePhase(activePhase + 1); setExpandedWeek(null); window.scrollTo(0,0); }}
              style={{ background: `${phases[activePhase+1].color}15`, border: `1px solid ${phases[activePhase+1].color}`, color: phases[activePhase+1].color, padding: "10px 20px", cursor: "pointer", borderRadius: "4px", fontFamily: "'Courier New', monospace", fontSize: "12px", letterSpacing: "1px" }}>
              {phases[activePhase + 1].title} →
            </button>
          )}
        </div>

        <div style={{ textAlign: "center", marginTop: "28px", fontSize: "10px", color: "#1e293b", letterSpacing: "2px", paddingBottom: "32px" }}>
          STUDY 1–2 HRS/DAY · CONSISTENCY BEATS INTENSITY · BUILD EVERYTHING
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Roadmap />);
  </script>
</body>
</html>
